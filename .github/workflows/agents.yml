name: G0GA Agents — 24/7 Scheduler

on:
  schedule:
    - cron: '0 19 * * *'    # Nova  — daily 12:00am PKT
    - cron: '0 19 * * 0'    # Kai   — Monday 12:00am PKT
    - cron: '0 19 * * 0'    # Zion  — Monday 12:00am PKT
    - cron: '0 */6 * * *'   # Zara  — every 6 hours
    - cron: '0 19 * * *'    # Scout — daily 12:00am PKT
    - cron: '0 20 * * 0'    # Luna  — Monday 1:00am PKT (weekly check)
    - cron: '0 21 * * 0'    # Vex   — Monday 2:00am PKT (weekly check)
    - cron: '30 19 * * 0'   # Digest— Monday 12:30am PKT (after all agents)
  workflow_dispatch:        # Manual trigger from GitHub UI anytime

jobs:

  nova:
    name: "Nova — Daily Social Post"
    runs-on: ubuntu-latest
    steps:
      - name: Run Nova
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/nova" \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}" \
            --max-time 30
          echo "Nova done."

  kai:
    name: "Kai — Weekly SEO Report"
    runs-on: ubuntu-latest
    steps:
      - name: Run Kai
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/kai" \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}" \
            --max-time 30
          echo "Kai done."

  zion:
    name: "Zion — Weekly Blog Post"
    runs-on: ubuntu-latest
    steps:
      - name: Run Zion
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/zion" \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}" \
            --max-time 30
          echo "Zion done."

  zara:
    name: "Zara — Lead Processing"
    runs-on: ubuntu-latest
    steps:
      - name: Run Zara
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/zara" \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}" \
            --max-time 30
          echo "Zara done."

  scout:
    name: "Scout — Daily Outreach"
    runs-on: ubuntu-latest
    steps:
      - name: Run Scout
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/scout" \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}" \
            --max-time 60
          echo "Scout done."

  luna:
    name: "Luna — Site Health Check"
    runs-on: ubuntu-latest
    steps:
      - name: Run Luna
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/monitor?agent=luna" \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}" \
            --max-time 30
          echo "Luna done."

  vex:
    name: "Vex — Reputation Monitor"
    runs-on: ubuntu-latest
    steps:
      - name: Run Vex
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/monitor?agent=vex" \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}" \
            --max-time 30
          echo "Vex done."

  digest:
    name: "Digest — Weekly CEO Email"
    runs-on: ubuntu-latest
    steps:
      - name: Run Digest
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/admin-data" \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"action":"digest"}' \
            -w "\nHTTP Status: %{http_code}" \
            --max-time 30
          echo "Digest done."
