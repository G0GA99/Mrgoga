name: Vex — Reputation Monitor (3x weekly)

on:
  schedule:
    - cron: '0 22 * * 1'   # Tuesday 3am PKT
    - cron: '0 22 * * 3'   # Thursday 3am PKT
    - cron: '0 22 * * 5'   # Saturday 3am PKT
  workflow_dispatch:

jobs:
  vex:
    name: "Vex — Reputation & Competitor Check"
    runs-on: ubuntu-latest
    steps:
      - name: Run Vex
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/monitor?agent=vex" \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}" \
            --max-time 60
          echo "Vex done."
