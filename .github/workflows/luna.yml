name: Luna — Daily Site Health

on:
  schedule:
    - cron: '0 23 * * *'   # 4am PKT daily
  workflow_dispatch:

jobs:
  luna:
    name: "Luna — Site Health Check"
    runs-on: ubuntu-latest
    steps:
      - name: Run Luna
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/monitor?agent=luna" \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}" \
            --max-time 60
          echo "Luna done."
