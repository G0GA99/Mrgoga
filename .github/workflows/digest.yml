name: Digest — Weekly CEO Report

on:
  schedule:
    - cron: '30 19 * * 0'  # Monday 12:30am PKT
  workflow_dispatch:

jobs:
  digest:
    name: "Digest — Weekly CEO Email"
    runs-on: ubuntu-latest
    steps:
      - name: Run Digest
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/admin-data" \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"action":"digest"}' \
            -w "\nHTTP Status: %{http_code}" \
            --max-time 60
          echo "Digest done."
