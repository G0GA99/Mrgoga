name: Nova — Social Posts (2x daily)

on:
  schedule:
    - cron: '0 3 * * *'    # 8am PKT / 7am Dubai
    - cron: '0 13 * * *'   # 6pm PKT / 5pm Dubai / 1pm London
  workflow_dispatch:

jobs:
  nova:
    name: "Nova — Post Content"
    runs-on: ubuntu-latest
    steps:
      - name: Run Nova
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/nova" \
            -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}" \
            --max-time 60
          echo "Nova done."
